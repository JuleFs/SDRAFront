<div class="min-h-screen flex bg-white">

  <!-- Columna izquierda: Logo -->
  <div class="hidden md:flex w-1/2 items-center justify-end pr-8 bg-white border-r border-gray-100">
    <img
      src="assets/logosroa.png"
      alt="Logo SROA"
      class="w-4/5 max-w-md object-contain"
    />
  </div>

  <!-- Columna derecha: Formulario centrado -->
  <div class="flex flex-1 items-center justify-start pl-8 bg-white">
    <div class="w-full max-w-sm space-y-6 rounded-xl bg-white p-6 shadow-xl border border-gray-200">

      <!-- Logo pequeño visible solo en móvil -->
      <div class="flex justify-center md:hidden">
        <img src="assets/logosroa.png" alt="Logo SROA" class="h-20 w-auto object-contain" />
      </div>

      <!-- Título -->
      <div class="text-center">
        <h3 class="text-2xl font-semibold text-gray-800">Iniciar sesión</h3>
      </div>

      <form [formGroup]="login_form" (keydown)="onKeydown($event)">
        <div class="space-y-4">

          <!-- Tipo de usuario -->
          <div class="flex gap-2">
            <button
              type="button"
              class="btn btn-outline btn-primary flex-1 transition-colors duration-200"
              [class.bg-blue-700]="userType === 'estudiante'"
              [class.text-white]="userType === 'estudiante'"
              [ngClass]="{ selected: activeClass }"
              (click)="userType = 'estudiante'"
            >
              <i class="fa-solid fa-user fa-lg"></i>
              <p>{{ "Estudiante" | translate }}</p>
            </button>
            <button
              type="button"
              class="btn btn-outline btn-primary flex-1 transition-colors duration-200"
              [class.bg-blue-700]="userType === 'profesor'"
              [class.text-white]="userType === 'profesor'"
              [ngClass]="{ selected: !activeClass }"
              (click)="userType = 'profesor'"
            >
              <i class="fa-solid fa-chalkboard-user fa-lg"></i>
              <p>{{ "Profesor" | translate }}</p>
            </button>
          </div>

          <!-- Número de cuenta -->
          <div>
            <label for="user" class="mb-1 block text-sm font-medium text-gray-700">
              {{ "Número de cuenta" | translate }}
            </label>
            <input
              placeholder="12345678"
              type="text"
              id="user"
              class="w-full rounded-lg border border-gray-300 px-3 py-2 text-gray-800 focus:border-blue-500 focus:ring focus:ring-blue-200"
              formControlName="nro_cuenta"
            />
          </div>

          <!-- Contraseña -->
          <div>
            <label for="pass" class="mb-1 block text-sm font-medium text-gray-700">
              {{ "Contraseña" | translate }}
            </label>
            <input
              placeholder="••••••••••"
              type="password"
              id="pass"
              class="w-full rounded-lg border border-gray-300 px-3 py-2 text-gray-800 focus:border-blue-500 focus:ring focus:ring-blue-200"
              formControlName="password"
            />
          </div>

          <!-- Divider -->
          <div class="flex items-center gap-3">
            <hr class="flex-grow border-gray-300" />
            <hr class="flex-grow border-gray-300" />
          </div>

          <!-- Botón ingresar -->
          <button
            type="button"
            class="w-full rounded-lg bg-blue-600 px-4 py-2 text-white font-medium hover:bg-blue-700 transition"
            (click)="sendLogin()"
          >
            {{ "Ingresar" | translate }}
          </button>
        </div>
      </form>
    </div>
  </div>

</div>
